name: Validate data

# Compiles every property/space/theorem/trait file, checks schemas,
# cross-references, and per-object contradictions, and produces bundle.json.
# The job fails on any error, so a red check = the data does not compile.

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout data
        uses: actions/checkout@v4

      - name: Compile and validate
        # Uses the same Docker action as the main pi-base/data repo.
        # Reads the repository from GITHUB_WORKSPACE, writes bundle.json there.
        # If you later fork the compiler (e.g. to add ISGCI/OEIS ref types),
        # replace this with a checkout + build of your fork and call
        # packages/compile/src/main.ts via tsx.
        uses: docker://ghcr.io/pi-base/compile:latest
        with:
          out: bundle.json

      - name: Upload bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: bundle.json
